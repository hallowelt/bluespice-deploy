apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bluespice.fullname" . }}
  namespace: {{ default "default" $.Release.Namespace }}
  labels:
    {{- include "bluespice.labels" . | nindent 4 }}
  {{- with $.Values.ingress.ingressAnnotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $.Values.ingress.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
  {{- $host := required "wikiEnv.configEnv.WIKI_HOST is required for ingress" $.Values.wikiEnv.configEnv.WIKI_HOST }}
  - host: {{ $host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $.Values.ingress.name }}
            port:
              name: http
      - path: /_collabpads
        pathType: Prefix
        backend:
          service:
            name: collabpads
            port:
              name: http
      - path: /_diagram
        pathType: Prefix
        backend:
          service:
            name: diagram
            port:
              name: http
  {{- if $.Values.ingress.tls }}
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ $.Values.ingress.tlsSecret }}
  {{- end }}
