{{- $combineWebTask := default false .Values.wikiServicesCombineWebAndTask }}
{{- range $key, $value := .Values.wikiServices }}
{{- if and $value.vpa $value.vpa.enabled (ne $value.name "wiki-task") (not (and $combineWebTask (eq $key "wiki-task"))) }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ printf "%s-vpa" $value.name }}
  namespace: {{ default "default" $.Release.Namespace }}
  labels:
    app: {{ $value.name }}
    {{- include "bluespice.labels" $ | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $value.name }}
  {{- with $value.vpa.updatePolicy }}
  updatePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $value.vpa.resourcePolicy }}
  resourcePolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- end }}
