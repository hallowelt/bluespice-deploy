{{- range $key, $value := .Values.statefulBackendServices }}
{{- if $value.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $value.name }}
  namespace: {{ default "default" $.Release.Namespace }}
  labels:
    app: {{ $value.name }}
spec:
  type: {{ $.Values.global.svc.type }}
  selector:
    app: {{ $value.name }}
  ports:
  - port: {{ $value.port }}
    targetPort: {{ $value.targetPort }}
    protocol: TCP
    name: http
---
{{- end }}
{{- end }}
