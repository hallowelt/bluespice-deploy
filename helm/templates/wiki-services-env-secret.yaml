{{- $secretName := printf "%s-wiki-secrets" (include "bluespice.fullname" .) }}
{{- $existing := .Values.wikiEnv.existingSecret.name }}
{{- $dbPass := default "" .Values.wikiEnv.secretEnv.DB_PASS }}
{{- $searchPass := default "" .Values.wikiEnv.secretEnv.SEARCH_PASS }}
{{- $statefulDbEnabled := and $.Values.statefulBackendServices $.Values.statefulBackendServices.database $.Values.statefulBackendServices.database.enabled }}
{{- $statefulSearchEnabled := and $.Values.statefulBackendServices $.Values.statefulBackendServices.search $.Values.statefulBackendServices.search.enabled }}
{{- $needsDb := and (not $statefulDbEnabled) $dbPass }}
{{- $needsSearch := and (not $statefulSearchEnabled) $searchPass }}
{{- $shouldRender := and (not $existing) (or $needsDb $needsSearch) }}
{{- if $shouldRender }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ default "default" $.Release.Namespace }}
  labels:
    {{- include "bluespice.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $needsDb }}
  DB_PASS: {{ $dbPass | quote }}
  {{- end }}
  {{- if $needsSearch }}
  SEARCH_PASS: {{ $searchPass | quote }}
  {{- end }}
{{- end }}
