{{- range $key, $value := .Values.statelessbackendServices }}
{{- if and $value.hpa $value.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ printf "%s-hpa" $value.name }}
  namespace: {{ default "default" $.Release.Namespace }}
  labels:
    app: {{ $value.name }}
    {{- include "bluespice.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $value.name }}
  minReplicas: {{ default 1 $value.hpa.minReplicas }}
  maxReplicas: {{ default 3 $value.hpa.maxReplicas }}
  metrics:
    {{- toYaml $value.hpa.metrics | nindent 4 }}
  {{- with $value.hpa.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
{{- end }}
