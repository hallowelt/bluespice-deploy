services:

  proxy:
    image: traefik:3.6
    command:  
      - "--log=true"
      - "--accesslog=true"
      - "--log.level=debug"
      - "--entrypoints.websecure.address=:443"
      - "--api=true"  
      - "--api.insecure=false"  
      - "--providers.docker=true"  
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=administrator@hallowelt.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DATADIR}/proxy/letsencrypt:/letsencrypt  
      - /var/run/docker.sock:/var/run/docker.sock
  keycloak:
    labels:  
      - "traefik.http.routers.keycloak.rule=Host(`${WIKI_HOST}`)&&PathPrefix(`/_auth`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.http.routers.keycloak.tls.certresolver=myresolver"

  wiki-web:
    labels:  
       - "traefik.http.routers.wiki-web.rule=Host(`${WIKI_HOST}`)&&PathPrefix(`/`)"
       - "traefik.http.routers.wiki-web.rule=Host(`${WIKI_HOST}`)"
       - "traefik.http.routers.wiki-web.entrypoints=websecure"
       - "traefik.http.services.wiki-web.loadbalancer.server.port=9090"
       - "traefik.http.routers.wiki-web.tls.certresolver=myresolver"

  diagram:
    labels:  
      - "traefik.http.routers.diagram.rule=Host(`${WIKI_HOST}`)&&PathPrefix(`/_diagram`)"
        #- "traefik.http.middlewares.diagrampathstrip.stripprefix.prefixes=/_diagram"
      - "traefik.http.routers.diagram.entrypoints=websecure"
        #- "traefik.http.routers.diagram.middlewares=diagrampathstrip"
      - "traefik.http.services.diagram.loadbalancer.server.port=8080"
      - "traefik.http.routers.diagram.tls.certresolver=myresolver"

  oauth2-proxy:
    labels:  
      - "traefik.http.routers.oauth-proxy.rule=Host(`${WIKI_HOST}`)&&PathPrefix(`/_login`)"
      - "traefik.http.routers.oauth-proxy.entrypoints=websecure"
      - "traefik.http.services.oauth-proxy.loadbalancer.server.port=4180"
      - "traefik.http.routers.oauth-proxy.tls.certresolver=myresolver"
